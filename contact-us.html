<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us | Technical Support & RFQ | Fasto Bimetal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center">
                <img src="https://sc02.alicdn.com/kf/H62ddfeb6f1d442be8071e80d7cd4e92aX.jpg" alt="Logo" class="h-12 mr-3">
                <span class="text-xl font-black tracking-tighter text-gray-800 uppercase">Bi-metal Screw</span>
            </a>
            <nav class="hidden md:flex space-x-8 font-medium">
                <a href="index.html" class="hover:text-orange-500">Home</a>
                <a href="products.html" class="hover:text-orange-500">Products</a>
                <a href="projects.html" class="hover:text-orange-500">Project</a>
                <a href="tech-center.html" class="hover:text-orange-500">Technical Center</a>
                <a href="news.html" class="hover:text-orange-500">News</a>
                <a href="about-us.html" class="hover:text-orange-500">About us</a>
                <a href="contact-us.html" class="hover:text-orange-500 text-orange-600 font-bold">Contact us</a>
            </nav>
        </div>
    </header>

    <section class="py-20">
        <div class="container mx-auto px-6 max-w-4xl">
            <h1 class="text-4xl font-bold mb-4">Request a Technical Quote</h1>
            <p class="text-gray-500 mb-12">Submit your substrate thickness and material requirements for a custom engineering solution.</p>
            
            <form action="#" id="rfq-form" class="bg-white p-10 rounded-2xl shadow-xl space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Company Email</label>
                        <input type="email" required class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-lg outline-none focus:border-orange-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Project Location</label>
                        <input type="text" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-lg outline-none focus:border-orange-500">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Technical Requirement (Thickness, Material, Quantity)</label>
                    <textarea rows="4" class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-lg outline-none focus:border-orange-500" placeholder="e.g. BF6-12 A4 bimetal for 10.0mm steel, 50,000 pcs"></textarea>
                </div>
                <button type="submit" class="w-full bg-[#e67e22] text-white py-4 rounded-lg font-bold text-lg hover:bg-orange-600 shadow-lg transition">Submit to OKKI CRM</button>
            </form>
        </div>
    </section>

    <footer class="bg-white py-12 px-6 border-t border-gray-100 text-center text-sm text-gray-500">
        &copy; 2026 Fasto Bimetal Screws.
    </footer>
</body>
</html>
