<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fasto Bimetal Screw Selector</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; padding: 40px; }
        .selector-container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; text-align: center; }
        h2 { color: #333; }
        .slider-box { margin: 40px 0; }
        input[type=range] { width: 100%; cursor: pointer; }
        .thickness-display { font-size: 24px; font-weight: bold; color: #e67e22; margin-top: 10px; }
        .result-card { margin-top: 30px; padding: 20px; border: 2px solid #eee; border-radius: 8px; transition: all 0.3s; opacity: 0; }
        .result-card.active { opacity: 1; border-color: #e67e22; background: #fffaf5; }
        .product-name { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .product-desc { color: #666; font-size: 14px; }
        .badge { background: #e67e22; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 12px; text-transform: uppercase; margin-left: 10px; }
    </style>
</head>
<body>

<div class="selector-container">
    <h2>Select Your Steel Thickness</h2>
    <p>Drag the slider to find the recommended Bimetal Screw.</p>
    
    <div class="slider-box">
        <input type="range" id="thicknessSlider" min="1" max="15" value="1" oninput="updateSelector(this.value)">
        <div class="thickness-display"><span id="mmValue">1</span> mm</div>
    </div>

    <div id="resultCard" class="result-card">
        <div class="product-name"><span id="modelName">BF3-2</span> <span id="heavyBadge" class="badge" style="display:none;">Heavy Duty</span></div>
        <div class="product-desc" id="modelDesc">Perfect for light gauge metal roofing and cladding.</div>
        <hr>
        <button style="background: #333; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin-top: 10px;">Get Quote for this Model</button>
    </div>
</div>

<script>
    function updateSelector(val) {
        document.getElementById('mmValue').innerText = val;
        const card = document.getElementById('resultCard');
        const model = document.getElementById('modelName');
        const desc = document.getElementById('modelDesc');
        const badge = document.getElementById('heavyBadge');
        
        card.classList.add('active');
        
        if (val <= 3) {
            model.innerText = "BF3-2 (#2 Point)";
            desc.innerText = "Optimized for thin steel sheets up to 3mm. Fast penetration.";
            badge.style.display = "none";
        } else if (val <= 6) {
            model.innerText = "BF3-6 (#3 Point)";
            desc.innerText = "Industrial standard for purlins and general metal construction (up to 6mm).";
            badge.style.display = "none";
        } else if (val <= 12) {
            model.innerText = "BF3-12 (#5 Point)";
            desc.innerText = "Extreme drilling capacity for heavy structural steel up to 12mm.";
            badge.style.display = "inline-block";
        } else {
            model.innerText = "BF3-Extreme (Custom)";
            desc.innerText = "Contact us for ultra-thick substrate solutions (15mm+).";
            badge.style.display = "inline-block";
        }
    }
    // Initialize
    updateSelector(1);
</script>

</body>
</html>
