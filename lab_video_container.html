<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fasto Lab Video Container</title>
    <style>
        .lab-video-wrapper {
            position: relative;
            max-width: 800px;
            margin: 40px auto;
            border: 1px solid #333;
            background: #000;
            padding: 5px;
            box-shadow: 0 0 20px rgba(0,255,0,0.1);
        }
        .lab-header {
            background: #1a1a1a;
            color: #0f0;
            padding: 5px 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #333;
        }
        .video-overlay {
            position: absolute;
            top: 40px;
            left: 20px;
            color: rgba(0, 255, 0, 0.8);
            font-family: 'Courier New', monospace;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
        }
        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 0, 0.05);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 4s linear infinite;
            z-index: 11;
            pointer-events: none;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        video {
            width: 100%;
            display: block;
            filter: grayscale(20%) contrast(110%);
        }
        .lab-footer {
            padding: 10px;
            color: #999;
            font-size: 11px;
            text-align: right;
        }
        .spec-badge {
            background: #e67e22;
            color: #fff;
            padding: 2px 8px;
            border-radius: 2px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="lab-video-wrapper">
    <div class="lab-header">
        <span>● LIVE: BF3-12 DRILLING PERFORMANCE TEST</span>
        <span>INSTRUMENT: FASTO-V3 TESTER</span>
    </div>
    <div class="video-overlay">
        STATUS: TESTING...<br>
        SPEC: <span class="spec-badge">BF3-12 / #5 POINT</span><br>
        SUBSTRATE: 12.0MM STEEL S235<br>
        RPM: 1800 [STABLE]
    </div>
    <div class="scanline"></div>
    <!-- Placeholder for your mp4 file -->
    <video autoplay loop muted playsinline>
        <source src="your-processed-video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="lab-footer">
        CERTIFIED BY FASTO QA LABORATORY | DATE: 2026-07-02
    </div>
</div>

</body>
</html>
